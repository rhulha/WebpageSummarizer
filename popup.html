<!DOCTYPE html>
<html>
<head>
  <title>Web Page Summarizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h3>Summarize Current Page</h3>
  <div id="api-key-row">
    <input type="password" id="apiKey" placeholder="Enter OpenAI API Key">
    <button id="saveKeyBtn">Save</button>
    <button id="clearKeyBtn">Clear</button>
  </div>
  <div id="status"></div>
  <button id="generateTitleBtn">Generate Title</button>
  <div id="titleOutput"></div>
  <button id="summarizeBtn">Summarize</button>
  <div id="summary-wrapper">
    <button id="copyBtn">copy</button>
    <div id="summary"></div>
  </div>
  <div id="chat-section">
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input type="text" id="chatInput" placeholder="Ask a question about the article...">
      <button id="chatSendBtn">Ask</button>
    </div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
